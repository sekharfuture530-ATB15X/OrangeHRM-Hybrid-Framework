# ================================================================
# OrangeHRM Hybrid Framework - Central Configuration
# ================================================================

# ---- Application Under Test ----
app.url=https://opensource-demo.orangehrmlive.com/web/index.php/auth/login
app.name=OrangeHRM

# ---- Default Credentials ----
app.default.username=Admin
app.default.password=admin123

# ---- Browser Configuration ----
# Supported: chrome | firefox | edge | chrome-headless | firefox-headless
browser=chrome

# ---- Environment ----
# Supported: qa | staging | prod
env=qa

# ---- Timeout Settings (seconds) ----
implicit.wait=10
explicit.wait=20
page.load.timeout=30
fluent.wait.polling=500

# ---- Screenshots ----
screenshot.on.failure=true
screenshot.on.pass=false
screenshot.dir=test-output/screenshots

# ---- Reports ----
extent.report.dir=test-output/ExtentReports
extent.report.name=OrangeHRM_Test_Report.html
extent.report.theme=DARK

# ---- Logging ----
log.level=INFO

# ---- Remote / Grid (Selenium Grid / BrowserStack) ----
run.remote=false
grid.url=http://localhost:4444/wd/hub
